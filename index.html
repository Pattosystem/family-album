<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>家族共有ひろば</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#fce8ea;
    --cream-2:#f7d7da;
    --paper:#ffffff;
    --paper-2:#fffafb;
    --ink:#1a1a1a;
    --ink-soft:#444444;
    --muted:#888888;
    --line:#e8c0c5;
    --line-soft:#f0d8dc;

    /* チーム色 — はっきりと見分けやすい青と赤橙 */
    --kota:#1565c0;
    --kota-dark:#0d47a1;
    --kota-soft:#e3f2fd;
    --kota-border:#90caf9;

    --tokihiko:#d84315;
    --tokihiko-dark:#bf360c;
    --tokihiko-soft:#ffeee5;
    --tokihiko-border:#ffab91;

    --gold:#b8924a;
    --ok:#2e7d32;
    --shadow-sm:0 1px 3px rgba(0,0,0,.08);
    --shadow:0 4px 16px -4px rgba(0,0,0,.12);
    --shadow-lg:0 12px 32px -8px rgba(0,0,0,.2);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--cream);color:var(--ink);font-family:"Noto Sans JP",sans-serif;font-weight:400;font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased}
  body{
    background-image:radial-gradient(ellipse 70% 40% at 20% 0%, rgba(21,101,192,.05), transparent 60%);
    min-height:100vh;
  }
  h1,h2,h3,h4{font-family:"Noto Serif JP",serif;font-weight:600;letter-spacing:.01em;margin:0;line-height:1.3}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
  input,textarea,select{font-family:inherit;color:var(--ink);font-size:15px}
  a{color:var(--kota);text-decoration:underline;text-underline-offset:2px}
  a:hover{opacity:.7}

  /* ============ HEADER ============ */
  header{
    background:rgba(255,253,248,.96);
    border-bottom:2px solid var(--line);
    padding:16px 24px 0;
    position:sticky;top:0;z-index:50;
    backdrop-filter:blur(10px);
  }
  .header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px}
  .brand{display:flex;align-items:center;gap:14px;min-width:0}
  .brand-mark{
    width:48px;height:48px;border-radius:12px;
    background:linear-gradient(135deg,var(--kota) 0%,var(--kota) 48%,var(--tokihiko) 52%,var(--tokihiko) 100%);
    display:flex;align-items:center;justify-content:center;color:#fff;
    font-family:"Noto Serif JP",serif;font-size:22px;font-weight:700;
    box-shadow:var(--shadow-sm);flex-shrink:0;
  }
  .brand h1{font-size:22px;font-weight:700;color:var(--ink)}
  .brand .brand-sub{display:block;font-size:12px;color:var(--muted);margin-top:2px;font-weight:400}
  .team-switch{display:flex;align-items:center;gap:10px;flex-shrink:0}
  .user-mgr-btn{
    display:flex;align-items:center;gap:8px;
    padding:10px 16px;border-radius:10px;
    background:var(--paper);border:2px solid var(--line);
    font-size:14px;font-weight:600;color:var(--ink);
    transition:all .15s;
  }
  .user-mgr-btn:hover{background:var(--cream-2);border-color:var(--gold)}
  .user-mgr-btn .umb-icon{font-size:18px}
  @media(max-width:640px){.user-mgr-btn .umb-text{display:none}.user-mgr-btn{padding:10px}}

  /* User list in management modal */
  .user-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
  .user-row{
    display:flex;align-items:center;gap:12px;
    padding:12px 14px;background:var(--paper-2);
    border:2px solid var(--line-soft);border-radius:10px;
  }
  .user-row .user-avatar{
    width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:14px;font-weight:700;flex-shrink:0;
  }
  .user-row .user-avatar.kota{background:var(--kota)}
  .user-row .user-avatar.tokihiko{background:var(--tokihiko)}
  .user-row .user-info{flex:1;min-width:0}
  .user-row .user-name{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:2px}
  .user-row .user-team-label{font-size:12px;color:var(--ink-soft)}
  .user-row .user-actions{display:flex;gap:6px}
  .user-row .btn-icon{padding:6px 10px;font-size:12px;border-radius:6px;background:var(--paper);border:1px solid var(--line);color:var(--ink-soft);font-weight:500}
  .user-row .btn-icon:hover{background:var(--cream-2)}
  .user-row .btn-icon.del{color:#c62828;border-color:#ef9a9a}
  .user-empty{text-align:center;padding:30px 20px;color:var(--muted);font-size:13px;background:var(--cream);border-radius:10px;margin-bottom:16px}

  /* Poster selector */
  .poster-picker{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
  .poster-option{
    display:flex;align-items:center;gap:12px;
    padding:10px 14px;border:2px solid var(--line-soft);border-radius:10px;
    background:var(--paper);cursor:pointer;transition:all .15s;
  }
  .poster-option:hover{background:var(--cream-2)}
  .poster-option.selected{border-width:3px;padding:9px 13px}
  .poster-option.selected.kota{border-color:var(--kota);background:var(--kota-soft)}
  .poster-option.selected.tokihiko{border-color:var(--tokihiko);background:var(--tokihiko-soft)}
  .poster-option .user-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
  .poster-option .user-avatar.kota{background:var(--kota)}
  .poster-option .user-avatar.tokihiko{background:var(--tokihiko)}
  .poster-option .poster-name{font-weight:600;color:var(--ink);flex:1}
  .poster-option .poster-team{font-size:11px;color:var(--ink-soft)}

  /* ============ TOP NAV ============ */
  .main-nav{max-width:1100px;margin:14px auto 0;display:flex;gap:0;padding:0;border-bottom:1px solid transparent}
  .main-nav button{
    padding:14px 24px;border:none;background:transparent;
    font-family:"Noto Sans JP",sans-serif;font-size:16px;font-weight:600;
    color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;
    transition:all .15s;display:flex;align-items:center;gap:8px;
  }
  .main-nav button:hover{color:var(--ink-soft)}
  .main-nav button.active{color:var(--ink);border-bottom-color:var(--gold);background:rgba(255,255,255,.5)}
  .main-nav .nav-icon{font-size:20px}

  /* ============ LAYOUT ============ */
  main{max-width:1100px;margin:0 auto;padding:28px 24px 120px}
  .page-intro{margin-bottom:32px;display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap}
  .page-intro h2{font-size:32px;font-weight:700;color:var(--ink)}
  .page-intro .sub{color:var(--ink-soft);font-size:14px;margin-top:4px}

  .btn{
    display:inline-flex;align-items:center;gap:8px;
    padding:12px 22px;border-radius:10px;
    background:var(--ink);color:#fff;
    font-size:15px;font-weight:600;
    transition:all .15s;
    box-shadow:var(--shadow-sm);
  }
  .btn:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
  .btn.ghost{background:var(--paper);color:var(--ink);border:2px solid var(--line)}
  .btn.ghost:hover{background:var(--cream-2)}
  .btn.kota{background:var(--kota);color:#fff}
  .btn.kota:hover{background:var(--kota-dark)}
  .btn.tokihiko{background:var(--tokihiko);color:#fff}
  .btn.tokihiko:hover{background:var(--tokihiko-dark)}
  .btn.danger{background:var(--paper);color:#c62828;border:2px solid #ef9a9a}
  .btn.danger:hover{background:#ffebee}
  .btn.small{padding:8px 14px;font-size:13px;border-radius:8px}

  /* ============ TRIP CARDS ============ */
  .trips-grid{display:grid;gap:20px;grid-template-columns:repeat(auto-fill,minmax(320px,1fr))}
  .trip-card{
    background:var(--paper);
    border:2px solid var(--line-soft);
    border-radius:14px;
    padding:22px;
    position:relative;
    transition:all .2s;
    cursor:pointer;
    overflow:hidden;
  }
  .trip-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--line)}
  .trip-card::before{
    content:"";position:absolute;top:0;left:0;right:0;height:6px;
    background:linear-gradient(90deg,var(--kota) 0%,var(--kota) 50%,var(--tokihiko) 50%,var(--tokihiko) 100%);
  }
  .trip-card .destination{font-family:"Noto Serif JP",serif;font-size:24px;font-weight:700;margin-bottom:4px;color:var(--ink)}
  .trip-card .dest-sub{font-size:13px;color:var(--ink-soft);margin-bottom:14px}
  .trip-card .dates-block{display:flex;flex-direction:column;gap:8px;margin:14px 0 16px;padding:14px;background:var(--cream);border-radius:10px;font-size:14px}
  .trip-card .date-row{display:flex;align-items:center;gap:10px}
  .trip-card .date-row .team-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .trip-card .date-row .team-dot.kota{background:var(--kota)}
  .trip-card .date-row .team-dot.tokihiko{background:var(--tokihiko)}
  .trip-card .date-row .team-name{font-weight:700;min-width:85px;color:var(--ink)}
  .trip-card .date-row .team-name.kota{color:var(--kota-dark)}
  .trip-card .date-row .team-name.tokihiko{color:var(--tokihiko-dark)}
  .trip-card .date-row .date-val{color:var(--ink-soft);font-variant-numeric:tabular-nums}
  .trip-card .date-row .date-val.empty{color:var(--muted);font-style:italic}
  .trip-card .stats{display:flex;gap:14px;flex-wrap:wrap;font-size:14px;color:var(--ink-soft);padding-top:14px;border-top:1px dashed var(--line-soft)}
  .trip-card .stat{display:flex;align-items:center;gap:4px;font-weight:500}

  /* ============ TRIP DETAIL ============ */
  .detail-header{
    background:var(--paper);border:2px solid var(--line-soft);border-radius:18px;
    padding:28px 30px;margin-bottom:24px;position:relative;overflow:hidden;
  }
  .detail-header::before{content:"";position:absolute;top:0;left:0;width:6px;bottom:0;background:linear-gradient(180deg,var(--kota) 0%,var(--kota) 50%,var(--tokihiko) 50%,var(--tokihiko) 100%)}
  .back-link{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--ink-soft);border:none;margin-bottom:14px;font-weight:500}
  .back-link:hover{color:var(--ink)}
  .detail-header h2{font-size:34px;font-weight:700;margin-bottom:4px;color:var(--ink)}
  .detail-header .dest-sub{font-size:14px;color:var(--ink-soft);margin-bottom:14px}
  .detail-header .notes{font-size:14px;color:var(--ink-soft);line-height:1.7;max-width:600px;margin-top:10px;background:var(--cream);padding:12px 14px;border-radius:8px}
  .detail-header .header-actions{position:absolute;top:24px;right:24px;display:flex;gap:8px}

  /* ============ TIMELINE ============ */
  .timeline-card{background:var(--paper);border:2px solid var(--line-soft);border-radius:14px;padding:22px;margin-bottom:24px}
  .timeline-title{font-size:15px;color:var(--ink);font-weight:600;margin-bottom:16px}
  .timeline{position:relative;padding:20px 0 8px}
  .timeline-scale{display:flex;justify-content:space-between;font-size:13px;color:var(--ink-soft);font-variant-numeric:tabular-nums;margin-bottom:8px;padding:0 2px;font-weight:500}
  .timeline-track{position:relative;height:80px;background:var(--cream);border-radius:10px;overflow:hidden;border:1px solid var(--line-soft)}
  .tl-bar{position:absolute;height:30px;border-radius:6px;display:flex;align-items:center;padding:0 12px;color:#fff;font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden}
  .tl-bar.kota{background:var(--kota);top:10px}
  .tl-bar.tokihiko{background:var(--tokihiko);top:44px}
  .tl-overlap{position:absolute;top:10px;height:60px;background:repeating-linear-gradient(45deg,rgba(184,146,74,.25),rgba(184,146,74,.25) 6px,transparent 6px,transparent 12px);border-left:2px dashed var(--gold);border-right:2px dashed var(--gold)}
  .tl-empty{color:var(--muted);text-align:center;padding:24px;font-size:14px}

  /* ============ TABS ============ */
  .tabs{display:flex;gap:4px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .tab{padding:12px 18px;border-radius:10px 10px 0 0;background:transparent;color:var(--ink-soft);font-size:14px;border-bottom:3px solid transparent;white-space:nowrap;font-weight:600;transition:all .15s}
  .tab:hover{color:var(--ink);background:var(--cream-2)}
  .tab.active{color:var(--ink);border-bottom-color:var(--gold);background:var(--paper)}
  .tab .count{display:inline-block;margin-left:6px;padding:2px 8px;border-radius:10px;background:var(--cream-2);font-size:11px;color:var(--ink-soft);font-weight:700}
  .tab.active .count{background:var(--gold);color:#fff}

  /* ============ SECTION ============ */
  .section{background:var(--paper);border:2px solid var(--line-soft);border-radius:14px;padding:24px}
  .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:12px;flex-wrap:wrap}
  .section-header h3{font-size:22px;font-weight:700;color:var(--ink)}

  /* ============ ITEM CARDS ============ */
  .items-list{display:flex;flex-direction:column;gap:14px}
  .item-card{border:2px solid var(--line-soft);border-radius:10px;padding:16px 18px;background:var(--paper-2);position:relative;transition:all .15s}
  .item-card:hover{box-shadow:var(--shadow-sm)}
  .item-card.kota{border-left:6px solid var(--kota)}
  .item-card.tokihiko{border-left:6px solid var(--tokihiko)}
  .item-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:8px}
  .item-head-left{flex:1;min-width:0}
  .item-title{font-family:"Noto Serif JP",serif;font-size:17px;font-weight:600;line-height:1.4;margin-bottom:4px;color:var(--ink)}
  .item-meta{font-size:12px;color:var(--ink-soft)}
  .team-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;font-size:12px;font-weight:700;white-space:nowrap}
  .team-badge.kota{background:var(--kota);color:#fff}
  .team-badge.tokihiko{background:var(--tokihiko);color:#fff}
  .item-body{font-size:14px;color:var(--ink);line-height:1.7}
  .item-body .row{display:flex;gap:10px;margin-bottom:4px;flex-wrap:wrap}
  .item-body .row .label{color:var(--ink-soft);min-width:90px;font-size:13px;font-weight:500}
  .item-body .row .val{flex:1;min-width:0;word-break:break-word}
  .item-body .notes{margin-top:12px;padding:12px 14px;background:#fff8e7;border-radius:8px;font-size:13px;border-left:4px solid var(--gold);white-space:pre-wrap;line-height:1.7}
  .item-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .item-actions .btn-icon{padding:6px 12px;font-size:13px;border-radius:6px;background:var(--paper);border:1px solid var(--line);color:var(--ink-soft);font-weight:500}
  .item-actions .btn-icon:hover{background:var(--cream-2)}
  .item-actions .btn-icon.del{color:#c62828;border-color:#ef9a9a}
  .item-actions .btn-icon.del:hover{background:#ffebee}

  /* ============ PHOTOS GRID ============ */
  .photos-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}
  .photo-card{background:var(--paper);border:2px solid var(--line-soft);border-radius:10px;overflow:hidden;aspect-ratio:4/3;position:relative;cursor:pointer;transition:all .2s}
  .photo-card:hover{transform:scale(1.02);box-shadow:var(--shadow)}
  .photo-card img{width:100%;height:100%;object-fit:cover;display:block}
  .photo-card .photo-overlay{position:absolute;bottom:0;left:0;right:0;padding:10px;background:linear-gradient(transparent,rgba(0,0,0,.75));color:#fff;font-size:13px;display:flex;justify-content:space-between;align-items:center;font-weight:500}
  .photo-card .photo-caption{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .photo-card .mini-badge{padding:2px 7px;border-radius:6px;font-size:11px;font-weight:700}
  .photo-card .mini-badge.kota{background:var(--kota);color:#fff}
  .photo-card .mini-badge.tokihiko{background:var(--tokihiko);color:#fff}

  .empty-state{text-align:center;padding:40px 20px;color:var(--ink-soft);font-size:15px}
  .empty-state .icon{font-size:44px;margin-bottom:12px;opacity:.7}

  /* ============ MOMENTS (日常) ============ */
  .moments-controls{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;align-items:center}
  .filter-chip{
    padding:9px 16px;border-radius:10px;border:2px solid var(--line);
    background:var(--paper);font-size:14px;color:var(--ink);font-weight:600;
    display:inline-flex;align-items:center;gap:6px;transition:all .15s;
  }
  .filter-chip:hover{background:var(--cream-2)}
  .filter-chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .filter-chip.active.kota{background:var(--kota);border-color:var(--kota);color:#fff}
  .filter-chip.active.tokihiko{background:var(--tokihiko);border-color:var(--tokihiko);color:#fff}

  .month-section{margin-bottom:36px}
  .month-header{
    display:flex;align-items:baseline;gap:14px;margin-bottom:16px;
    padding-bottom:12px;border-bottom:2px solid var(--line-soft);
  }
  .month-header h3{font-family:"Noto Serif JP",serif;font-size:26px;font-weight:700;color:var(--ink)}
  .month-header .month-count{margin-left:auto;font-size:14px;color:var(--ink-soft);font-weight:500}

  .moments-grid{
    display:grid;gap:14px;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    grid-auto-rows:10px;
  }
  @media(max-width:640px){.moments-grid{grid-template-columns:repeat(2,1fr);gap:10px}}

  .moment-card{
    background:var(--paper);border:2px solid var(--line-soft);
    border-radius:12px;overflow:hidden;cursor:pointer;
    transition:all .2s;position:relative;
    display:flex;flex-direction:column;
  }
  .moment-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
  .moment-card.kota{border-top:5px solid var(--kota)}
  .moment-card.tokihiko{border-top:5px solid var(--tokihiko)}
  .moment-media{position:relative;background:var(--cream);overflow:hidden;aspect-ratio:1/1}
  .moment-media.tall{aspect-ratio:3/4}
  .moment-media.wide{aspect-ratio:4/3}
  .moment-media img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
  .moment-card:hover .moment-media img{transform:scale(1.04)}
  .moment-media .team-label-badge{
    position:absolute;top:10px;right:10px;padding:4px 10px;
    border-radius:6px;font-size:12px;font-weight:700;color:#fff;
    box-shadow:0 2px 4px rgba(0,0,0,.2);
  }
  .moment-media .team-label-badge.kota{background:var(--kota)}
  .moment-media .team-label-badge.tokihiko{background:var(--tokihiko)}

  .moment-body{padding:14px;flex:1;display:flex;flex-direction:column}
  .moment-title{font-family:"Noto Serif JP",serif;font-size:16px;font-weight:700;line-height:1.4;margin-bottom:6px;color:var(--ink)}
  .moment-desc{font-size:13px;color:var(--ink-soft);line-height:1.6;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .moment-meta{font-size:12px;color:var(--ink-soft);display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:10px;border-top:1px dashed var(--line-soft)}
  .moment-meta .by{font-weight:600;color:var(--ink)}

  .moment-card.note-only{padding:20px 22px}
  .moment-card.note-only .moment-body{padding:0}
  .moment-card.note-only .moment-title{font-size:18px;margin-bottom:10px}
  .moment-card.note-only .moment-desc{-webkit-line-clamp:unset;font-size:14px;line-height:1.7}
  .moment-card.note-only::before{
    content:"💬";position:absolute;top:-14px;left:14px;
    background:var(--gold);color:#fff;width:28px;height:28px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:13px;
    box-shadow:0 2px 4px rgba(0,0,0,.15);
  }

  /* ============ MODAL ============ */
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:100;padding:0;backdrop-filter:blur(4px);animation:fadeIn .18s ease}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{background:var(--paper);border-radius:18px 18px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:26px 24px 30px;position:relative;animation:slideUp .22s cubic-bezier(.2,.8,.2,1);box-shadow:0 -20px 60px -10px rgba(0,0,0,.3)}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

function fmtDateLong(s){ if(!s) return ''; const d=new Date(s); if(isNaN(d)) return s; return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日'; }
function escapeHtml(str){ if(str==null) return ''; return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ========================================================================

function compressImage(file, maxDim=1400, quality=0.82){
  return new Promise((resolve, reject) => {
    if(!file.type.startsWith('image/')){
      reject(new Error('画像ファイルではありません'));
      return;
    }
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if(w > maxDim || h > maxDim){
          if(w > h){ h = Math.round(h * (maxDim / w)); w = maxDim; }
          else { w = Math.round(w * (maxDim / h)); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        try {
          const dataUrl = canvas.toDataURL('image/jpeg', quality);
          resolve(dataUrl);
        } catch(err){ reject(err); }
      };
      img.onerror = () => reject(new Error('画像の読み込みに失敗しました'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('ファイルの読み込みに失敗しました'));
    reader.readAsDataURL(file);
  });
}

function estimateDataUrlSize(dataUrl){
  if(!dataUrl || !dataUrl.startsWith('data:')) return 0;
  const base64 = dataUrl.split(',')[1] || '';
  return Math.round(base64.length * 0.75); // bytes
}
function formatSize(bytes){
  if(bytes < 1024) return bytes + 'B';
  if(bytes < 1024*1024) return Math.round(bytes/1024) + 'KB';
  return (bytes/1024/1024).toFixed(1) + 'MB';
}

async function handlePhotoFiles(inputEl, prefix){
  const files = Array.from(inputEl.files);
  if(!files.length) return;
  const pickerBtn = document.getElementById(prefix + '_pickerBtn');
  const addMoreBtn = document.getElementById(prefix + '_addMoreBtn');
  if(pickerBtn) pickerBtn.classList.add('compressing');
  if(addMoreBtn) addMoreBtn.classList.add('compressing');

  if(!window['_photos_' + prefix]) window['_photos_' + prefix] = [];
  let errors = 0;
  for(const file of files){
    if(!file.type.startsWith('image/')){ errors++; continue; }
    try {
      const dataUrl = await compressImage(file);
      window['_photos_' + prefix].push(dataUrl);
      renderPhotosGrid(prefix);
    } catch(err){
      errors++;
    }
  }

  if(pickerBtn) pickerBtn.classList.remove('compressing');
  if(addMoreBtn) addMoreBtn.classList.remove('compressing');
  inputEl.value = '';
  if(errors > 0) toast(errors + '枚の画像を処理できませんでした');
}

function addPhotoFromUrl(url, prefix){
  url = (url || '').trim();
  if(!url) return;
  if(!window['_photos_' + prefix]) window['_photos_' + prefix] = [];
  window['_photos_' + prefix].push(url);
  renderPhotosGrid(prefix);
  const input = document.getElementById(prefix + '_urlManual');
  if(input) input.value = '';
}

function removePhotoFromSelection(prefix, index){
  const photos = window['_photos_' + prefix] || [];
  photos.splice(index, 1);
  renderPhotosGrid(prefix);
}

function renderPhotosGrid(prefix){
  const photos = window['_photos_' + prefix] || [];
  const grid = document.getElementById(prefix + '_photosGrid');
  const pickerBtn = document.getElementById(prefix + '_pickerBtn');
  const addMoreBtn = document.getElementById(prefix + '_addMoreBtn');
  if(!grid) return;

  if(photos.length === 0){
    grid.style.display = 'none';
    if(pickerBtn) pickerBtn.style.display = 'flex';
    if(addMoreBtn) addMoreBtn.style.display = 'none';
  } else {
    grid.style.display = 'grid';
    if(pickerBtn) pickerBtn.style.display = 'none';
    if(addMoreBtn) addMoreBtn.style.display = 'flex';
    grid.innerHTML = photos.map((url, i) => `
      <div class="photo-preview-item">
        <img src="${escapeHtml(url)}" alt="">
        <button type="button" class="photo-remove-mini" onclick="removePhotoFromSelection('${prefix}', ${i})">×</button>
        ${url.startsWith('data:') ? `<div class="photo-size-mini">${formatSize(estimateDataUrlSize(url))}</div>` : ''}
      </div>
    `).join('');
  }
}

function renderPhotoUploadField(prefix, existingUrls){
  // Accept array or single url for backwards compatibility
  const urls = Array.isArray(existingUrls) ? existingUrls : (existingUrls ? [existingUrls] : []);
  window['_photos_' + prefix] = [...urls];

  setTimeout(() => renderPhotosGrid(prefix), 0);

  return `
    <div class="photo-upload-wrap">
      <div id="${prefix}_photosGrid" class="photos-preview-grid"></div>
      <label class="photo-picker-btn" id="${prefix}_pickerBtn">
        <input type="file" accept="image/*" multiple onchange="handlePhotoFiles(this,'${prefix}')" hidden>
        <span class="ppb-icon">📷</span>
        <span class="ppb-text">写真を選ぶ</span>
        <span class="ppb-sub">スマホ・PCから選択（複数枚OK）</span>
      </label>
      <label class="photo-picker-btn add-more" id="${prefix}_addMoreBtn" style="display:none">
        <input type="file" accept="image/*" multiple onchange="handlePhotoFiles(this,'${prefix}')" hidden>
        <span class="ppb-icon">➕</span>
        <span class="ppb-text">さらに写真を追加</span>
      </label>
      <details class="url-fallback">
        <summary>画像のURLから追加する場合</summary>
        <div style="display:flex;gap:8px;margin-top:8px">
          <input type="url" id="${prefix}_urlManual" placeholder="https://..." style="flex:1">

}

function renderTimeline(trip){
  const hasK = trip.kotaStart && trip.kotaEnd;
  const hasT = trip.tokihikoStart && trip.tokihikoEnd;
  if(!hasK && !hasT){
    return `<div class="timeline-card"><div class="timeline-title">日程</div><div class="tl-empty">日程が未入力です</div></div>`;
  }
  const dates = [trip.kotaStart,trip.kotaEnd,trip.tokihikoStart,trip.tokihikoEnd].filter(Boolean);
  const min = new Date(Math.min(...dates.map(d=>new Date(d))));
  const max = new Date(Math.max(...dates.map(d=>new Date(d))));
  const total = (max - min) + 86400000;
  const pct = s => ((new Date(s)-min)/total)*100;
  const widthPct = (s,e) => (((new Date(e)-new Date(s))+86400000)/total)*100;

  let kotaBar='', tokihikoBar='', overlapBar='';
  if(hasK) kotaBar = `<div class="tl-bar kota" style="left:${pct(trip.kotaStart)}%;width:${widthPct(trip.kotaStart,trip.kotaEnd)}%">KOTA</div>`;
  if(hasT) tokihikoBar = `<div class="tl-bar tokihiko" style="left:${pct(trip.tokihikoStart)}%;width:${widthPct(trip.tokihikoStart,trip.tokihikoEnd)}%">TOKIHIKO</div>`;
  if(hasK && hasT){
    const ovS = new Date(Math.max(new Date(trip.kotaStart), new Date(trip.tokihikoStart)));
    const ovE = new Date(Math.min(new Date(trip.kotaEnd), new Date(trip.tokihikoEnd)));
    if(ovE >= ovS){
      const ovDays = Math.round((ovE-ovS)/86400000)+1;
      overlapBar = `<div class="tl-overlap" style="left:${((ovS-min)/total)*100}%;width:${(((ovE-ovS)+86400000)/total)*100}%" title="重なり${ovDays}日"></div>`;
    }
  }

  return `
    <div class="timeline-card">
      <div class="timeline-title">日程 (斜線は両家族の滞在が重なる期間)</div>
      <div class="timeline">
        <div class="timeline-scale"><span>${fmtDate(min)}</span><span>${fmtDate(max)}</span></div>
        <div class="timeline-track">${overlapBar}${kotaBar}${tokihikoBar}</div>
      </div>
    </div>
  `;
}

function renderMomentsView(){
  const banner = !USE_FIREBASE ? `
    <div class="setup-banner">
      <span>💡</span>
      <div><strong>この端末だけで保存中</strong>です。家族みんなで共有するには、このファイル内の <code>FIREBASE_CONFIG</code> にFirebaseの設定を入れてください。</div>
    </div>` : '';

  const filtered = filterMoments();

  if(!STATE.moments.length){
    return banner + `
      <div class="page-intro">
        <div><h2>日常の記録</h2><div class="sub">写真・メッセージで近況を共有</div></div>
        <button class="btn" onclick="openMomentModal()">+ 投稿する</button>
      </div>
      <div class="empty-state"><div class="icon">📷</div><div>まだ投稿がありません</div></div>
    `;
  }

  const grouped = groupMomentsByMonth(filtered);

  return banner + `
    <div class="page-intro">
      <div><h2>日常の記録</h2><div class="sub">${STATE.moments.length}件の投稿</div></div>
      <button class="btn" onclick="openMomentModal()">+ 投稿する</button>
    </div>
    <div class="moments-controls">
      <button class="filter-chip ${STATE.momentFilter==='all'?'active':''}" onclick="setMomentFilter('all')">すべて</button>
      <button class="filter-chip ${STATE.momentFilter==='photo'?'active':''}" onclick="setMomentFilter('photo')">📷 写真</button>
      <button class="filter-chip ${STATE.momentFilter==='note'?'active':''}" onclick="setMomentFilter('note')">💬 メッセージ</button>
    </div>
    ${filtered.length ? grouped.map(g => renderMonthGroup(g)).join('') : `<div class="empty-state"><div>該当する投稿がありません</div></div>`}
  `;
}

function filterMoments(){
  const f = STATE.momentFilter;
  if(f === 'all') return STATE.moments;
  if(f === 'kota' || f === 'tokihiko') return STATE.moments.filter(m => m.team === f);
  return STATE.moments.filter(m => m.type === f);
}

function setMomentFilter(f){ STATE.momentFilter = f; render(); }

function groupMomentsByMonth(moments){
  const sorted = [...moments].sort((a,b) => (new Date(b.date||b.createdAt) - new Date(a.date||a.createdAt)));
  const groups = {};
  sorted.forEach(m => {
    const d = new Date(m.date || m.createdAt);
    const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    if(!groups[key]) groups[key] = {year:d.getFullYear(), month:d.getMonth()+1, items:[]};
    groups[key].items.push(m);
  });
  return Object.values(groups).sort((a,b) => (b.year*100+b.month) - (a.year*100+a.month));
}

function renderMonthGroup(group){
  return `
    <div class="month-section">
      <div class="month-header">
        <h3>${group.year}年${group.month}月</h3>
        <span class="month-count">${group.items.length}件の投稿</span>
      </div>
      <div class="moments-grid">${group.items.map(m => renderMomentCard(m)).join('')}</div>
    </div>
  `;
}

function renderMomentCard(m){
  const dateStr = m.date ? fmtDateShort(m.date) : '';
  const byStr = m.createdBy || teamLabel(m.team);

  if(m.type === 'note'){
    return `
      <div class="moment-card note-only ${m.team}" onclick="openMomentModal('${m.id}')" style="grid-row:span 18">
        <div class="moment-body">
          <div class="moment-title">${escapeHtml(m.title || 'メッセージ')}</div>
          ${m.description?`<div class="moment-desc" style="-webkit-line-clamp:10">${escapeHtml(m.description)}</div>`:''}
          <div class="moment-meta">
            <span class="by">${escapeHtml(byStr)}</span>
            <span>${dateStr}</span>
          </div>
        </div>
      </div>
    `;
  }

  // photo (single or album)
  const urls = (m.mediaUrls && m.mediaUrls.length) ? m.mediaUrls : (m.mediaUrl ? [m.mediaUrl] : []);
  const firstUrl = urls[0] || '';
  const count = urls.length;
  const teamName = m.team === 'kota' ? 'KOTA' : 'TOKIHIKO';
  const aspectClass = ['','tall','wide'][Math.abs(hashStr(m.id))%3];
  const albumBadge = count > 1 ? `<div class="album-badge">📷 ${count}枚</div>` : '';
  const mediaHtml = `
    <div class="moment-media ${aspectClass}">
      <img src="${escapeHtml(firstUrl)}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='<div style=\\'width:100%;height:100%;background:var(--cream-2);display:flex;align-items:center;justify-content:center;color:var(--ink-soft);font-size:14px\\'>画像エラー</div>'">
      ${albumBadge}
      <div class="team-label-badge ${m.team}">${teamName}</div>
    </div>
  `;

  const span = aspectClass === 'tall' ? 32 : aspectClass === 'wide' ? 24 : 28;

  return `
    <div class="moment-card ${m.team}" onclick="openMomentLightbox('${m.id}')" style="grid-row:span ${span}">
      ${mediaHtml}
      <div class="moment-body">
        ${m.title?`<div class="moment-title">${escapeHtml(m.title)}</div>`:''}
        ${m.description?`<div class="moment-desc">${escapeHtml(m.description)}</div>`:''}
        <div class="moment-meta">
          <span class="by">${escapeHtml(byStr)}</span>
          <span>${dateStr}</span>
        </div>
      </div>
    </div>
  `;
}

function hashStr(s){ let h=0; for(let i=0;i<s.length;i++) h=((h<<5)-h+s.charCodeAt(i))|0; return h; }

let LIGHTBOX_STATE = { momentId: null, index: 0 };

function openMomentLightbox(momentId, startIndex){
  const m = STATE.moments.find(x => x.id === momentId);
  if(!m) return;
  const urls = (m.mediaUrls && m.mediaUrls.length) ? m.mediaUrls : (m.mediaUrl ? [m.mediaUrl] : []);
  if(!urls.length) return;

  LIGHTBOX_STATE = { momentId, index: Math.max(0, Math.min(startIndex||0, urls.length-1)) };
  renderLightbox();
}

function renderLightbox(){
  const m = STATE.moments.find(x => x.id === LIGHTBOX_STATE.momentId);
  if(!m){ closeLightbox(); return; }
  const urls = (m.mediaUrls && m.mediaUrls.length) ? m.mediaUrls : (m.mediaUrl ? [m.mediaUrl] : []);
  if(!urls.length){ closeLightbox(); return; }

  const idx = LIGHTBOX_STATE.index;
  const total = urls.length;
  const currentUrl = urls[idx];
  const isAlbum = total > 1;

  const teamColor = m.team === 'kota' ? '#1565c0' : '#d84315';
  const teamName = m.team === 'kota' ? 'KOTA' : 'TOKIHIKO';

  const root = document.getElementById('lightboxRoot');
  root.innerHTML = `
    <div class="lightbox" onclick="if(event.target===this)closeLightbox()">
      <button class="close" onclick="closeLightbox()">×</button>
      ${isAlbum ? `<div class="lightbox-counter">${idx+1} / ${total}</div>` : ''}
      ${isAlbum && idx > 0 ? `<div class="lightbox-tap-zone left" onclick="lightboxPrev()"></div>` : ''}
      ${isAlbum && idx < total-1 ? `<div class="lightbox-tap-zone right" onclick="lightboxNext()"></div>` : ''}
      ${isAlbum ? `<button class="lightbox-nav prev" onclick="lightboxPrev()" ${idx===0?'disabled':''}>‹</button>` : ''}
      ${isAlbum ? `<button class="lightbox-nav next" onclick="lightboxNext()" ${idx===total-1?'disabled':''}>›</button>` : ''}
      <div class="media-wrap"><img src="${escapeHtml(currentUrl)}" alt=""></div>
      <div class="lb-info">
        ${m.title?`<h4>${escapeHtml(m.title)}</h4>`:''}
        ${m.description?`<p>${escapeHtml(m.description)}</p>`:''}
        <p class="by-line">
          <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${teamColor};margin-right:6px;vertical-align:middle"></span>
          ${teamName} / ${escapeHtml(m.createdBy || '')} / ${m.date ? fmtDateLong(m.date) : ''}
        </p>
        <div style="margin-top:16px;display:flex;gap:8px;justify-content:center">
          <button class="btn ghost small" style="background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.4);color:#fff" onclick="closeLightbox();openMomentModal('${m.id}')">編集</button>
          <button class="btn danger small" onclick="closeLightbox();confirmDeleteMoment('${m.id}')">削除</button>
        </div>
      </div>
    </div>
  `;
}

function lightboxPrev(){
  if(LIGHTBOX_STATE.index > 0){ LIGHTBOX_STATE.index--; renderLightbox(); }
}
function lightboxNext(){
  const m = STATE.moments.find(x => x.id === LIGHTBOX_STATE.momentId);
  if(!m) return;
  const urls = (m.mediaUrls && m.mediaUrls.length) ? m.mediaUrls : (m.mediaUrl ? [m.mediaUrl] : []);
  if(LIGHTBOX_STATE.index < urls.length - 1){ LIGHTBOX_STATE.index++; renderLightbox(); }
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if(!document.getElementById('lightboxRoot').querySelector('.lightbox')) return;
  if(e.key === 'ArrowLeft') lightboxPrev();
  else if(e.key === 'ArrowRight') lightboxNext();
  else if(e.key === 'Escape') closeLightbox();
});

// Touch/swipe navigation for lightbox
let _swipeStartX = null;
document.addEventListener('touchstart', e => {
  const lb = document.getElementById('lightboxRoot').querySelector('.lightbox');
  if(!lb) return;
  _swipeStartX = e.touches[0].clientX;
}, {passive:true});
document.addEventListener('touchend', e => {
  const lb = document.getElementById('lightboxRoot').querySelector('.lightbox');
  if(!lb || _swipeStartX === null) return;
  const dx = e.changedTouches[0].clientX - _swipeStartX;
  _swipeStartX = null;
  if(Math.abs(dx) > 60){
    if(dx > 0) lightboxPrev();
    else lightboxNext();
  }
}, {passive:true});

function closeLightbox(){ document.getElementById('lightboxRoot').innerHTML = ''; }

      <div class="form-row"><label>リンク（任意）</label><input id="i_url" type="url" value="${escapeHtml(f.url||'')}" placeholder="https://..."></div>
    `;
  }

  document.getElementById('modalRoot').innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <button class="modal-close" onclick="closeModal()">×</button>
        <h3>${iconFor(type)} ${existing?'編集':'追加'}：${typeMap[type]}</h3>
        <div class="modal-sub">旅行の情報を追加します</div>
        ${renderPosterPicker('i', initialUserId)}
        ${formFields}
        <div class="form-row"><label>メモ・その他</label><textarea id="i_notes" placeholder="感想、お得情報、注意点など">${escapeHtml(existing?.notes||'')}</textarea></div>
        <div class="modal-actions">
          <button class="btn ghost" onclick="closeModal()">キャンセル</button>
          <button class="btn ${btnClass}" onclick="saveItem('${type}','${editId||''}')">${existing?'保存':'追加'}</button>
        </div>
      </div>
    </div>
  `;
}

async function saveItem(type, editId){
  const trip = STATE.trips.find(t=>t.id===STATE.currentTripId);
  if(!trip) return;
  const title = document.getElementById('i_title').value.trim();
  if(!title && type!=='photo'){ toast('タイトルを入力してください'); return; }

  const poster = getSelectedPoster('i');
  if(!poster){
    if(STATE.users.length === 0){
      toast('先にユーザーを登録してください');
      closeModal(); openUserManagement();
    } else {
      toast('投稿者を選んでください');
    }
    return;
  }

  const getV = id => { const el=document.getElementById(id); return el?el.value.trim():''; };

  // Photo: handle multi-upload — when adding, create one item per photo
  if(type === 'photo'){
    const photoUrls = window._photos_i || [];
    if(photoUrls.length === 0){ toast('写真を選んでください'); return; }

    if(!trip.items) trip.items = [];
    const notes = getV('i_notes');

    if(editId){
      const item = trip.items.find(i=>i.id===editId);
      if(item){
        item.title = title;
        item.fields = {url: photoUrls[0]};
        item.notes = notes;
        item.team = poster.team;
        item.userId = poster.id;
        item.createdBy = poster.name;
        for(let i = 1; i < photoUrls.length; i++){
          trip.items.push({ id:uid(), type:'photo', team:poster.team, userId:poster.id, title, fields:{url:photoUrls[i]}, notes,
            createdAt:Date.now()+i, createdBy:poster.name });
        }
      }
    } else {
      for(let i = 0; i < photoUrls.length; i++){
        trip.items.push({ id:uid(), type:'photo', team:poster.team, userId:poster.id, title, fields:{url:photoUrls[i]}, notes,
          createdAt:Date.now()+i, createdBy:poster.name });
      }
    }

    try {
      await syncTrip(trip);
      saveData(); closeModal(); render();
      toast((editId?'更新しました':`${photoUrls.length}枚追加しました`));
    } catch(err) {
      console.error(err);
      const msg = String(err.message || err);
      if(err.name === 'QuotaExceededError' || msg.includes('quota')){
        toast('端末の保存容量がいっぱいです');
      } else if(msg.includes('10 MB') || msg.includes('too large') || msg.includes('size')){
        toast('写真の枚数が多すぎます');
      } else {
        toast('保存に失敗しました');
      }
    }
    return;
  }

  let fields = {};
  if(type==='flight') fields = {airline:getV('i_airline'),flightNo:getV('i_flightNo'),date:getV('i_date'),depart:getV('i_depart'),arrive:getV('i_arrive'),bookingSite:getV('i_bookingSite'),bookingUrl:getV('i_bookingUrl')};
  else if(type==='hotel') fields = {address:getV('i_address'),checkin:getV('i_checkin'),checkout:getV('i_checkout'),bookingSite:getV('i_bookingSite'),bookingUrl:getV('i_bookingUrl')};
  else if(type==='car') fields = {company:getV('i_company'),pickup:getV('i_pickup'),return:getV('i_return'),pickupDate:getV('i_pickupDate'),returnDate:getV('i_returnDate'),bookingSite:getV('i_bookingSite'),bookingUrl:getV('i_bookingUrl')};
  else if(type==='rec') fields = {category:getV('i_category'),area:getV('i_area'),url:getV('i_url')};

  if(!trip.items) trip.items = [];
  if(editId){
    const item = trip.items.find(i=>i.id===editId);
    if(item){
      item.title=title; item.fields=fields; item.notes=getV('i_notes');
      item.team = poster.team; item.userId = poster.id; item.createdBy = poster.name;
    }
  } else {
    trip.items.push({ id:uid(), type, team:poster.team, userId:poster.id, title, fields, notes:getV('i_notes'),
      createdAt:Date.now(), createdBy:poster.name });
  }
  try {
    await syncTrip(trip);
    saveData(); closeModal(); render();
    toast(editId?'更新しました':'追加しました');
  } catch(err) {
    console.error(err);
    const msg = String(err.message || err);
    if(err.name === 'QuotaExceededError' || msg.includes('quota')){
      toast('端末の保存容量がいっぱいです');
    } else {
      toast('保存に失敗しました');
    }
  }
}

async function confirmDeleteItem(itemId){
  const trip = STATE.trips.find(t=>t.id===STATE.currentTripId);
  if(!trip) return;
  if(!confirm('この項目を削除しますか？')) return;
  trip.items = (trip.items||[]).filter(i=>i.id!==itemId);
  await syncTrip(trip);
  saveData(); render(); toast('削除しました');
}

/* ----- MOMENT MODAL ----- */
function openMomentModal(editId){
  const existing = editId ? STATE.moments.find(m=>m.id===editId) : null;
  const today = new Date().toISOString().split('T')[0];

  // Determine initial selected user
  let initialUserId = null;
  if(existing && existing.userId) initialUserId = existing.userId;
  else if(existing && existing.createdBy){
    const matched = STATE.users.find(u => u.name === existing.createdBy);
    if(matched) initialUserId = matched.id;
  }
  if(!initialUserId) initialUserId = STATE.currentUserId;
  if(!initialUserId && STATE.users.length > 0) initialUserId = STATE.users[0].id;

  const selectedUser = STATE.users.find(u => u.id === initialUserId);
  const btnClass = selectedUser ? selectedUser.team : '';

  document.getElementById('modalRoot').innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <button class="modal-close" onclick="closeModal()">×</button>
        <h3>${existing?'投稿を編集':'新しい投稿'}</h3>
        <div class="modal-sub">写真やメッセージを共有しましょう</div>

        ${renderPosterPicker('m', initialUserId)}

        <div class="form-row">
          <label>種類</label>
          <div class="type-choice" id="typeChoice">
            <label>
              <input type="radio" name="mtype" value="photo" ${(!existing||existing.type==='photo')?'checked':''} onchange="updateMomentFields()">
              <span class="tc-inner"><span class="tc-icon">📷</span><span class="tc-name">写真</span></span>
            </label>
            <label>
              <input type="radio" name="mtype" value="note" ${existing?.type==='note'?'checked':''} onchange="updateMomentFields()">
              <span class="tc-inner"><span class="tc-icon">💬</span><span class="tc-name">メッセージ</span></span>
            </label>
          </div>
        </div>

        <div id="momentFields"></div>

        <div class="form-row">
          <label>タイトル</label>
          <input id="m_title" type="text" value="${escapeHtml(existing?.title||'')}" placeholder="例: 週末のピクニック">
        </div>
        <div class="form-row">
          <label>メッセージ・説明</label>
          <textarea id="m_desc" placeholder="一言コメント、出来事、感想など">${escapeHtml(existing?.description||'')}</textarea>
        </div>
        <div class="form-row">
          <label>日付</label>
          <input id="m_date" type="date" value="${existing?.date || today}">
        </div>

        <div class="modal-actions">
          <button class="btn ghost" onclick="closeModal()">キャンセル</button>
          <button class="btn ${btnClass}" onclick="saveMoment('${editId||''}')">${existing?'保存':'投稿'}</button>
        </div>
      </div>
    </div>
  `;
  window._editingMomentUrl = (existing?.mediaUrls && existing.mediaUrls.length) ? existing.mediaUrls : (existing?.mediaUrl ? [existing.mediaUrl] : []);
  updateMomentFields();
}

function updateMomentFields(){
  const type = document.querySelector('input[name="mtype"]:checked').value;
  const fields = document.getElementById('momentFields');
  const savedUrl = window._editingMomentUrl || '';

  if(type === 'photo'){
    fields.innerHTML = `
      <div class="form-row">
        <label>写真 <span class="req">*</span></label>
        ${renderPhotoUploadField('m', savedUrl)}
      </div>
    `;
  } else {
    fields.innerHTML = `<div class="hint" style="margin-bottom:14px;padding:12px 14px;background:var(--cream);border-radius:8px;font-size:13px;color:var(--ink);line-height:1.6">💬 文字だけの投稿です。下の「メッセージ・説明」欄に近況を書いてください。</div>`;
  }
}

async function saveMoment(editId){
  const type = document.querySelector('input[name="mtype"]:checked').value;
  const title = document.getElementById('m_title').value.trim();
  const desc = document.getElementById('m_desc').value.trim();
  const date = document.getElementById('m_date').value;

  const poster = getSelectedPoster('m');
  if(!poster){
    if(STATE.users.length === 0){
      toast('先にユーザーを登録してください');
      closeModal(); openUserManagement();
    } else {
      toast('投稿者を選んでください');
    }
    return;
  }

  let mediaUrls = [];
  if(type === 'photo'){
    mediaUrls = window._photos_m || [];
    if(mediaUrls.length === 0){ toast('写真を選んでください'); return; }
  }

  if(type === 'note' && !title && !desc){
    toast('タイトルまたはメッセージを入力してください');
    return;
  }

  let m;
  if(editId){
    m = STATE.moments.find(x=>x.id===editId);
    if(!m) return;
  } else {
    m = { id:uid(), createdAt:Date.now() };
    STATE.moments.unshift(m);
  }
  m.type = type;
  m.team = poster.team;
  m.userId = poster.id;
  m.createdBy = poster.name;
  m.title = title;
  m.description = desc;
  m.date = date;
  m.mediaUrls = mediaUrls;
  m.mediaUrl = mediaUrls[0] || '';

  try {
    await syncMoment(m);
    saveMomentsData();
    closeModal(); render();
    toast(editId?'更新しました':'投稿しました');
  } catch(err) {
    console.error(err);
    const msg = String(err.message || err);
    if(err.name === 'QuotaExceededError' || msg.includes('quota')){
      toast('端末の保存容量がいっぱいです');
    } else if(msg.includes('10 MB') || msg.includes('too large') || msg.includes('size')){
      toast('写真の枚数が多すぎます。10枚以下に減らしてください');
    } else if(msg.includes('PERMISSION_DENIED') || msg.includes('permission')){
      toast('アクセス権限エラー。Firebaseのルール設定を確認してください');
    } else {
      toast('保存に失敗しました');
    }
  }
}

async function confirmDeleteMoment(mid){
  if(!confirm('この投稿を削除しますか？')) return;
  await deleteMomentFB(mid);
  STATE.moments = STATE.moments.filter(m=>m.id!==mid);
  saveMomentsData(); render(); toast('削除しました');
}
